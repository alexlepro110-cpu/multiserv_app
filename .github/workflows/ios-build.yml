name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
   
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
     
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
         
      - name: Install dependencies
        run: flutter pub get
       
      - name: List files before build
        run: ls -la
       
      - name: Build iOS
        run: flutter build ios --release --no-codesign
       
      - name: List files after build
        run: |
          echo "=== RECHERCHE DE FICHIERS ==="
          find . -name "*.app" -o -name "*.ipa"
          echo "=== DOSSIER DE BUILD ==="
          ls -la build/ios/iphoneos/ || echo "Dossier inexistant" 
