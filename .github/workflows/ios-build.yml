name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
   
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
     
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
         
      - name: Install dependencies
        run: flutter pub get
       
      - name: Build iOS
        run: flutter build ios --release --no-codesign
       
      - name: Upload IPA
        uses: actions/upload-artifact@v3
        with:
          name: Multiserv-iOS
          path: build/ios/iphoneos/*.ipa 